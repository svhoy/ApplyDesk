<div class="schema-fields">

    {% for field in fields %}

        <div class="schema-field-row">

            <div>
                <div class="font-medium">
                    {{ field.label }}
                </div>

                <div class="text-sm muted">
                    {{ field.type }}
                </div>
            </div>

        </div>

    {% empty %}

        <div class="empty-state">
            No fields defined yet
        </div>

    {% endfor %}

</div>

<div class="panel-actions">

    <button class="primary-button">
        + Add Field
    </button>

</div>
