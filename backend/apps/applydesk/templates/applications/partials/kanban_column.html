<div
        class="kanban-column"
        data-status="{{ status }}"
>

    <div class="kanban-column-header">
        <h3>{{ status|title }}</h3>

        <span class="badge">
            {{ applications|length }}
        </span>
    </div>

    <div
            id="column-body-{{ status }}"
            class="drop-zone"
            data-status="{{ status }}"

    >

        {% include "applications/partials/kanban_column_body.html" with status=status columns=columns %}

    </div>

</div>
